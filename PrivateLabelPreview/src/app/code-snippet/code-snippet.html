<div class="codeContainer">
    <p>
      @if (copyEnabled()) {
        <button class="copyButton" (click)="copyCodeSnippet()">{{ buttonText() }}</button>
      }
      @if(confirmCopy()) {
        <span class="confirmation">Config Copied ✅</span>
      }
    </p>
    <pre>
      {{code().trim()}}
    </pre>
  </div>
