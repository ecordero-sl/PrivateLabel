<div class="formContainer">
  <h4>New Private Label Email Config Builder:</h4>
  <form>
    <div class="textFieldGrid">
      <p>
        <span class="requiredField">Server Subdomain:</span>
        <span class="radioGroup">
          <label class="radioOption" for="configSubdomainDev">
            <input
              type="radio"
              name="configSubdomain"
              id="configSubdomainDev"
              value="dev"
              [checked]="newConfigSubdomain() === 'dev'"
              (change)="updateSubdomain($any($event))"
            />
            dev
          </label>
          <label class="radioOption" for="configSubdomainWww">
            <input
              type="radio"
              name="configSubdomain"
              id="configSubdomainWww"
              value="www"
              [checked]="newConfigSubdomain() === 'www'"
              (change)="updateSubdomain($any($event))"
            />
            www
          </label>
        </span>
      </p>
      <p>
        <label class="requiredField" [class.requiredEmpty]="isNameRequired()" for="configName">
          Name:
        </label>
        <input
          type="text"
          name="configName"
          id="configName"
          [value]="newConfigName()"
          (keyup)="updateName($any($event))"
        />
      </p>
      <p>
        <label class="requiredField" [class.requiredEmpty]="isManagerIdRequired()" for="configManagerId">
          Manager ID:
        </label>
        <input
          type="text"
          name="configManagerId"
          id="configManagerId"
          [value]="newConfigManagerId()"
          (keyup)="updateManagerId($any($event))"
        />
      </p>
      <p>
        <label class="requiredField" [class.requiredEmpty]="isLogoFileRequired()" for="configLogoFile">
          Logo Filename:
        </label>
        <input
          type="text"
          name="configLogoFile"
          id="configLogoFile"
          [value]="newConfigLogoFile()"
          (keyup)="updateLogoFile($any($event))"
        />
      </p>
      <p>
        <label
          class="requiredField"
          [class.requiredEmpty]="isBackgroundColorRequired()"
          for="configBackgroundColor"
        >
          Background Color:
        </label>
        <input
          type="text"
          name="configBackgroundColor"
          id="configBackgroundColor"
          [value]="newConfigBackgroundColor()"
          (keyup)="updateConfigBackgroundColor($any($event))"
        />
      </p>
      <p>
        <label class="requiredField" [class.requiredEmpty]="isColorRequired()" for="configColor">
          Text Color:
        </label>
        <input
          type="text"
          name="configColor"
          id="configColor"
          [value]="newConfigColor()"
          (keyup)="updateConfigColor($any($event))"
        />
      </p>
    </div>
    <div class="themeToggleRow">
      <label [class.isChecked]="isDarkMode()">
        <input
          type="checkbox"
          name="theme"
          formControlName="isDarkMode"
          [value]="isDarkMode()"
          (click)="onThemeChange($any($event))"
        />
        Preview Dark Mode: (how your customizations will look if email viewed in Dark mode)
      </label>
    </div>
  </form>
</div>
