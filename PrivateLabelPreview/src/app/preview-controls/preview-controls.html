<div class="previewControls">

@if(privateLabels().length > 0) {
  <div class="buttonScroller">
    <div class="buttons" aria-label="Saved preview options">
      @for (pl of privateLabels(); track $index) {
        <button
          [class.isSelected]="pl.managerId === newManagerId()"
          (click)="onClick($event)"
          value="{{pl.managerId}}"
        >{{pl.name}}</button>
      }
    </div>
  </div>
}
<div class="managerInfo">
  <strong>{{selectedPrivateLabelName()}}</strong><br>
  {{managerId()}}
</div>
</div>
